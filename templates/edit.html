{% extends "base.html" %}
{% block title %}Edit Assignment — AssignTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">

    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-header bg-primary text-white rounded-top-4">
        <h5 class="mb-0">
          <i class="bi bi-pencil-square me-2"></i>Edit Assignment
        </h5>
      </div>
      <div class="card-body">

        <!--
          ACTION="/update/<id>" → Flask route
          METHOD="POST"
        -->
        <form action="{{ url_for('update', aid=assignment.id) }}" method="POST" id="editForm" novalidate>

          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="edit_title" name="title"
                   value="{{ assignment.title }}"/>
            <div class="invalid-feedback" id="editTitleErr">Please enter a title.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="edit_subject" name="subject"
                   value="{{ assignment.subject }}"/>
            <div class="invalid-feedback" id="editSubjectErr">Please enter a subject.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Due Date <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="edit_due" name="due_date"
                   value="{{ assignment.due_date }}"/>
            <div class="invalid-feedback" id="editDateErr">Please select a due date.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Priority</label>
            <select class="form-select" name="priority">
              <option value="Low"    {% if assignment.priority == 'Low'    %}selected{% endif %}>🟢 Low</option>
              <option value="Medium" {% if assignment.priority == 'Medium' %}selected{% endif %}>🟡 Medium</option>
              <option value="High"   {% if assignment.priority == 'High'   %}selected{% endif %}>🔴 High</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" name="description" rows="2">{{ assignment.description or '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-semibold flex-fill">
              <i class="bi bi-save me-2"></i>Save Changes
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary flex-fill">
              <i class="bi bi-x-circle me-2"></i>Cancel
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// jQuery validation for edit form
$("#editForm").on("submit", function(e) {
  let valid = true;

  if ($("#edit_title").val().trim() === "") {
    $("#edit_title").addClass("is-invalid");
    valid = false;
  } else {
    $("#edit_title").removeClass("is-invalid");
  }

  if ($("#edit_subject").val().trim() === "") {
    $("#edit_subject").addClass("is-invalid");
    valid = false;
  } else {
    $("#edit_subject").removeClass("is-invalid");
  }

  if ($("#edit_due").val() === "") {
    $("#edit_due").addClass("is-invalid");
    valid = false;
  } else {
    $("#edit_due").removeClass("is-invalid");
  }

  if (!valid) e.preventDefault();
});

// Remove red border on typing
$("#editForm input").on("input", function() {
  $(this).removeClass("is-invalid");
});
</script>
{% endblock %}
